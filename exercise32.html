<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>ShowDebug</title>
</head>
<body>

    <h1>請開啟開發者工具查看 Console</h1>

    <script>
        // 這行指令會將文字輸出到瀏覽器的除錯視窗（Console）
        console.log("Hello JavaScript");
        
        // 你也可以試著輸出數字或計算結果
        console.log(1 + 1);
    </script>

</body>
</html>
