<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <!-- 關鍵：這行沒加，Media Query 在手機或模擬器上就不會動 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 27 - Responsive Layout Fixed</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #4da6ff;
            font-family: Arial, sans-serif;
        }

        .main-container {
            background-color: white;
            border-radius: 10px;
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .block {
            border-radius: 5px;
            margin: 5px;
        }

        .header-block {
            background-color: #a6d947;
            height: 100px;
        }

        .flex-container {
            display: flex;
            flex-wrap: wrap;
        }

        /* 預設樣式 (圖 b：寬螢幕) */
        .middle-block {
            background-color: #00bcd4;
            height: 60px;
            flex: 1 1 calc(33.33% - 10px);
        }

        .bottom-block {
            background-color: #e0e0e0;
            height: 40px;
            flex: 1 1 calc(25% - 10px);
        }

        /* --- 響應式區塊：請確保這段放在樣式的最後面 --- */
        @media screen and (max-width: 480px) {
            .middle-block {
                /* 強制變為單欄 */
                flex: 1 1 100% !important; 
            }

            .bottom-block {
                /* 強制變為兩欄 (50%) */
                flex: 1 1 calc(50% - 10px) !important;
            }
            
            /* 測試用：如果 Media Query 成功，背景會變色 */
            body {
                background-color: #ffcc00; 
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-block block"></div>

        <div class="flex-container">
            <div class="middle-block block"></div>
            <div class="middle-block block"></div>
            <div class="middle-block block"></div>
        </div>

        <div class="flex-container">
            <div class="bottom-block block"></div>
            <div class="bottom-block block"></div>
            <div class="bottom-block block"></div>
            <div class="bottom-block block"></div>
        </div>
    </div>

</body>
</html>
