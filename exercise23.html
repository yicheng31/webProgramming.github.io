<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 23 - CSS 圖片樣式實作</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }

        /* 讓三張圖片水平排列的容器 */
        .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 1. 左側圖片：圓角 18px、不變形 */
        .no-distortion {
            width: 33%;
            height: 300px;
            border-radius: 18px; /* 依照圖片標註 */
            object-fit: cover;    /* 關鍵：保持比例不變形 */
        }

        /* 2. 中間圖片：正圓形 150px、帶邊框 */
        .circle-border {
            width: 150px;
            height: 150px;
            border-radius: 50%;      /* 變成圓形 */
            border: 1px solid #333;  /* 依照圖片標註的 border */
            object-fit: cover;       /* 保持比例 */
        }

        /* 3. 右側圖片：強制拉伸、產生變形 */
        .distortion {
            width: 33%;
            height: 300px;
            object-fit: fill;        /* 關鍵：強制填滿導致變形 */
        }

        /* 標籤文字樣式 */
        .label-text {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2 style="text-align:center;">CSS Image Styling Practice (Ex 23)</h2>

    <div class="container">
        <!-- 樣式一：No Distortion -->
        <div>
            <img src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&w=400&h=400" 
                 class="no-distortion" alt="No Distortion">
            <div class="label-text">radius 18px / No Distortion</div>
        </div>

        <!-- 樣式二：Circle -->
        <div>
            <img src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&w=400&h=400" 
                 class="circle-border" alt="Circle">
            <div class="label-text">150px / border</div>
        </div>

        <!-- 樣式三：Distortion -->
        <div>
            <img src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&w=400&h=400" 
                 class="distortion" alt="Distortion">
            <div class="label-text">width 33% / Distortion</div>
        </div>
    </div>

</body>
</html>
