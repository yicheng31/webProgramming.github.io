<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello world DEMO</title>
    <style>
        body {
    background-color: #e6e6e6;
    font-family: "Times New Roman", serif;
}

/* 外框 */
.container {
    width: 600px;
    margin: 50px auto;
    padding: 30px;
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* 第一個 */
.box1 {
    background: #9fb7c4;
    padding: 10px;
    border: 6px double #e86c4f;
    outline: 4px solid #e86c4f;
    margin-bottom: 25px;
}

/* 第二個 */
.box2 {
    background: #f0f25a;
    padding: 10px;
    border: 4px solid #5b8cff;
    border-radius: 15px;
    margin-bottom: 25px;
}

/* 第三個 */
.box3 {
    background: #6ea97a;
    padding: 10px;
    border: 8px dotted gray;
}

/* 文字 */
h1 {
    margin: 0;
}
    </style>
</head>
<body>
    <div class="containier">
        <div class="box1">Hello World</div>
        <div class="box2">Hello World</div>
        <div class="box3">Hello World</div>
    </div>
</body>
</html>
