<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 圖片樣式練習</title>
    <style>
        /* 讓容器內的圖片水平排列 */
        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            gap: 10px;
        }

        /* 左側圖片：圓角、不變形 */
        .no-distortion {
            width: 33%;
            height: 300px;
            border-radius: 18px; /* 標註 radius 18px */
            object-fit: cover;    /* 關鍵：防止變形 */
        }

        /* 中間圖片：正圓形、150px */
        .circle-border {
            width: 150px;
            height: 150px;
            border-radius: 50%;   /* 變成圓形 */
            border: 1px solid #333; /* 標註 border */
            object-fit: cover;
        }

        /* 右側圖片：變形 */
        .distortion {
            width: 33%;
            height: 300px;
            object-fit: fill;     /* 會導致圖片拉伸變形 */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 左側：No Distortion -->
        <img src="https://picsum.photos/800/800" class="no-distortion" alt="無變形圓角圖片">

        <!-- 中間：Circle Border -->
        <img src="https://picsum.photos/800/800" class="circle-border" alt="圓形邊框圖片">

        <!-- 右側：Distortion -->
        <img src="https://picsum.photos/800/800" class="distortion" alt="變形圖片">
    </div>

</body>
</html>
