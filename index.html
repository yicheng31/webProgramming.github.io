<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap & RWD 整合練習</title>
  
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  
  <style>
    /* 全域樣式設定 */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding-bottom: 100px;
      background-color: #f8f9fa;
    }

    h2 {
      margin: 40px 20px 10px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ddd;
    }

    .section {
      margin-bottom: 60px;
      padding: 20px;
      background-color: #fff;
    }

    /* ===== 第1題：圖片樣式 (保留您的設定) ===== */
    .img-flex-container {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .box {
      flex: 1;
      min-width: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .img-left { width: 100%; border-radius: 18px; object-fit: cover; }
    .img-middle { width: 150px; height: 150px; border-radius: 50%; border: 15px solid #ccc; object-fit: cover; }
    .img-right { width: 100%; height: 300px; object-fit: fill; }

    /* ===== 第2題：按鈕互動 (調整類別避免衝突) ===== */
    .layout-wrapper {
      display: flex;
      border: 1px solid #ccc;
    }

    .sidebar {
      width: 220px;
      padding: 10px;
      border-right: 1px solid #ccc;
      background-color: #fdfdfd;
    }

    .item { height: 20px; background-color: #90ee90; margin-bottom: 6px; }

    .content-pane {
      flex: 1;
      padding: 20px;
    }

    .image-box {
      width: 100%;
      max-width: 500px;
      height: 250px;
      background-color: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .custom-btn {
      margin-top: 10px;
      padding: 5px 15px;
      border-radius: 8px;
      border: 1px solid #222;
      background-color: #fff;
      cursor: pointer;
    }

    .details-box {
      margin-top: 15px;
      padding: 10px;
      border: 1px solid #ccc;
      display: none;
    }
