<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
  }

  h2 {
    margin: 40px 20px 10px;
  }

  .section {
    margin-bottom: 60px; /* 題目間距 */
  }

  /* ===== 第1題：圖片 ===== */
  .container {
    display: flex;
    gap: 20px;
    padding: 20px;
  }

  .box {
    width: 33%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .img-left {
    width: 100%;
    border-radius: 18px;
    object-fit: cover;
  }

  .img-middle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 15px solid #ccc;
    object-fit: cover;
  }

  .img-right {
    width: 100%;
    height: 300px;
    object-fit: fill;
  }

  /* ===== 第2題：按鈕 ===== */
  .layout {
    display: flex;
  }

  .sidebar {
    width: 220px;
    padding: 10px;
    border-right: 1px solid #ccc;
  }

  .item {
    height: 20px;
    background-color: #90ee90;
    margin-bottom: 6px;
  }

  .content {
    flex: 1;
    padding: 20px;
  }

  .image-box {
    width: 500px;
    height: 250px;
    background-color: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn {
    margin-top: 10px;
    height: 22px;
    padding: 0 12px;
    border-radius: 8px;
    border: 1px solid #222;
    background-color: #fff;
    font-size: 13px;
    cursor: pointer;
  }

  .details {
    margin-top: 15px;
    padding: 10px;
    border: 1px solid #ccc;
    display: none;
  }

  /* ===== 第5題：RWD ===== */
  .rwd-container {
    background: #4fa3d1;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .card {
    width: 300px;
    background: #eee;
    padding: 10px;
    border-radius: 10px;
  }

  .green {
    height: 80px;
    background: yellowgreen;
    margin-bottom: 10px;
  }

  .blue-group {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .blue {
    flex: 1;
    height: 80px;
    background: #1bb3c1;
  }

  .gray-group {
    display: flex;
    gap: 10px;
  }

  .gray {
    flex: 1;
    height: 40px;
    background: #ccc;
  }

  /* 手機版（<480px） */
  @media (max-width: 480px) {
    .blue-group {
      flex-direction: column;
    }

    .gray-group {
      flex-direction: column;
    }
  }
</style>

<body>

<!-- ===== 第1題 ===== -->
<div class="section">
  <h2>1. Image Styling</h2>

  <div class="container">
    <div class="box">
      <img src="https://picsum.photos/id/1011/600/400" class="img-left">
    </div>

    <div class="box">
      <img src="https://picsum.photos/id/1015/600/400" class="img-middle">
    </div>

    <div class="box">
      <img src="https://picsum.photos/id/1011/600/400" class="img-right">
    </div>
  </div>
</div>

<!-- ===== 第2題 ===== -->
<div class="section">
  <h2>2. Button Interaction</h2>

  <div class="layout">
    <div class="sidebar">
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
    </div>

    <div class="content">
      <div class="image-box">Image</div>

      <button class="btn" onclick="toggleDetails()">
        查看詳細資訊
      </button>

      <div class="details" id="details">
        <p>Detail information shown here.</p>
      </div>
    </div>
  </div>
</div>

<!-- ===== 第5題 ===== -->
<div class="section">
  <h2>5. Responsive Layout (RWD)</h2>

  <div class="rwd-container">
    <div class="card">
      <div class="green"></div>

      <div class="blue-group">
        <div class="blue"></div>
        <div class="blue"></div>
        <div class="blue"></div>
      </div>

      <div class="gray-group">
        <div class="gray"></div>
        <div class="gray"></div>
        <div class="gray"></div>
        <div class="gray"></div>
      </div>
    </div>
  </div>
</div>

<script>
  function toggleDetails() {
    const d = document.getElementById("details");
    d.style.display = (d.style.display === "block") ? "none" : "block";
  }
</script>

</body>
