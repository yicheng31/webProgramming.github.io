<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Demo</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  /* ===== 圖片區 ===== */
  .container {
    display: flex;
    gap: 20px;
    padding: 20px;
  }

  .box {
    width: 33%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .img-left {
    width: 100%;
    border-radius: 18px;
    object-fit: cover;
  }

  .img-middle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 15px solid #ccc;
    object-fit: cover;
  }

  .img-right {
    width: 100%;
    height: 300px;
    object-fit: fill;
  }

  /* ===== 按鈕區 ===== */
  .btn {
    margin: 20px;
    height: 22px;
    padding: 0 12px;
    border-radius: 8px;
    border: 1px solid #222;
    background-color: #fff;
    font-size: 13px;
    cursor: pointer;
  }

  .btn:hover {
    background-color: #f0f0f0;
  }

  .details {
    margin: 0 20px 20px 20px;
    padding: 10px;
    border: 1px solid #ccc;
    display: none;
  }
</style>

<body>

<!-- 圖片區 -->
<div class="container">
  <div class="box">
    <img src="https://picsum.photos/id/1011/600/400" class="img-left">
  </div>

  <div class="box">
    <img src="https://picsum.photos/id/1015/600/400" class="img-middle">
  </div>

  <div class="box">
    <img src="https://picsum.photos/id/1011/600/400" class="img-right">
  </div>
</div>

<!-- 按鈕 -->
<button class="btn" onclick="toggleDetails()">
  查看詳細資訊
</button>

<!-- 詳細資訊 -->
<div class="details" id="details">
  <p><strong>Title:</strong> Image Demo</p>
  <p><strong>Description:</strong> CSS image styling + button interaction.</p>
</div>

<script>
  function toggleDetails() {
    const d = document.getElementById("details");
    d.style.display = (d.style.display === "block") ? "none" : "block";
  }
</script>

</body>
</html>
</html>
