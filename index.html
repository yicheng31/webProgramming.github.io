<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>整合練習：Bootstrap, Layout, Images & JS</title>
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <style>
        /* --- 通用間距設定 --- */
        .section-divider {
            margin: 50px 0;
            border-top: 2px dashed #ccc;
        }
        
        .practice-title {
            margin-bottom: 20px;
            color: #333;
            border-left: 5px solid #5eb5f7;
            padding-left: 10px;
        }

        /* --- 2. 響應式佈局練習 CSS --- */
        .layout-practice-bg {
            background-color: #5eb5f7;
            padding: 20px;
            border-radius: 15px;
        }

        .layout-container {
            background-color: white;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .layout-header {
            background-color: #a7d149;
            height: 120px;
            border-radius: 5px;
        }

        .content-wrapper {
            display: flex;
            gap: 10px;
            flex-direction: row;
        }

        .blue-box {
            background-color: #00bcd4;
            flex: 1;
            height: 100px;
            border-radius: 5px;
        }

        .footer-wrapper {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .grey-box {
            background-color: #e9ecef;
            height: 40px;
            border-radius: 5px;
        }

        @media (max-width: 480px) {
            .content-wrapper {
                flex-direction: column;
            }
            .blue-box {
                flex: none;
                width: 100%;
            }
            .footer-wrapper {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* --- 3. CSS 圖片樣式練習 CSS --- */
        .gallery {
            display: flex;
            justify-content: space-around;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .item-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 33%;
        }

        .left-img {
            width: 100%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover;
        }

        .center-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 1px solid black;
            object-fit: cover;
        }

        .right-img {
            width: 100%;
            height: 300px;
            object-fit: fill;
        }

        .img-label {
            margin-top: 10px;
            color: green;
            font-weight: bold;
        }

        /* --- 4. JS 按鈕設計規範 CSS --- */
        .info-button {
            height: 32px; /* 稍微調高以便點擊 */
            border-radius: 8px;
            padding: 0 18px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #2f2f2f;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.2s;
            outline: none;
            margin-bottom: 30px;
        }

        .info-button:hover {
            background-color: #f0f0f0;
        }

        .info-button:active {
            background-color: #e0e0e0;
        }
        .container {
            border: 1px solid #ccc;
            padding: 20px;
            width: 200px;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        /* 初始文字樣式 */
        #displayText {
            font-size: 24px;
            margin-bottom: 20px;
            color: black; /* 初始顏色 */
        }

        /* 按鈕樣式 */
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container" style="margin-top: 30px;">
        
        <h2 class="practice-title">1. Bootstrap 基礎組件</h2>
        <div class="jumbotron">
            <h1>My First Bootstrap Page</h1>
            <p>這是一個整合了多種前端練習的展示頁面。</p>
        </div>

        <div class="form-group">
            <label for="input">輸入框示範:</label>
            <input type="text" class="form-control" id="input" placeholder="請輸入文字...">
        </div>

        <div class="alert alert-success">
            <strong>成功！</strong> 這是一個 Bootstrap 的警示框 (Alert)。
        </div>

        <button type="button" class="btn btn-default">預設按鈕</button>
        <span class="badge">通知 5</span>

        <div class="section-divider"></div>


        <h2 class="practice-title">2. Flexbox 與 Grid 響應式佈局</h2>
        <p>縮小視窗寬度至 480px 以下可觀察排列變化：</p>
        <div class="layout-practice-bg">
            <div class="layout-container">
                <div class="layout-header"></div>

                <div class="content-wrapper">
                    <div class="blue-box"></div>
                    <div class="blue-box"></div>
                    <div class="blue-box"></div>
                </div>

                <div class="footer-wrapper">
                    <div class="grey-box"></div>
                    <div class="grey-box"></div>
                    <div class="grey-box"></div>
                    <div class="grey-box"></div>
                </div>
            </div>
        </div>

        <div class="section-divider"></div>


        <h2 class="practice-title">3. Object-fit 圖片樣式控制</h2>
        <div class="gallery">
            <div class="item-group">
                <img src="https://picsum.photos/id/43/800/1200" class="left-img" alt="Eiffel Tower">
                <div class="img-label">no distortion (cover)</div>
            </div>

            <div class="item-group">
                <img src="https://picsum.photos/id/10/500/500" class="center-img" alt="Mountain">
                <div class="img-label">circle border 150px</div>
            </div>

            <div class="item-group">
                <img src="https://picsum.photos/id/43/800/1200" class="right-img" alt="Eiffel Tower">
                <div class="img-label" style="color: red;">distortion (fill)</div>
            </div>
        </div>

        <div class="section-divider"></div>


        <h2 class="practice-title">4. JavaScript 點擊狀態切換</h2>
        <p>點擊下方按鈕切換文字狀態：</p>
        <button id="toggleBtn" class="info-button" onclick="handleToggle()">查看資訊</button>
        
    </div>
    
    <h1>Exercise 30</h1>
    <div class="container">
        <div id="displayText">Hello</div>
        <button id="actionButton">Button</button>
    </div>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <script>
        function handleToggle() {
            // 1. 抓到按鈕這個元素
            const btn = document.getElementById('toggleBtn');
            
            // 2. 判斷目前的文字內容並切換
            if (btn.innerText === "查看資訊") {
                btn.innerText = "收起資訊";
                console.log("狀態：已展開");
            } else {
                btn.innerText = "查看資訊";
                console.log("狀態：已收起");
            }
        }
        // 1. 取得 DOM 元素
        const text = document.getElementById('displayText');
        const btn = document.getElementById('actionButton');

        // 2. 監聽滑鼠移入事件 (Mouse Over)
        btn.addEventListener('mouseover', function() {
            text.style.color = '#ff00ff'; // 變更為粉紅色
        });

        // 3. 監聽滑鼠移出事件 (選擇性：若想移開後變回黑色)
        btn.addEventListener('mouseout', function() {
            // 如果點擊後不需要變回黑色，可以移除這段
            if (text.innerText !== "Mouse Click") {
                text.style.color = 'black';
            }
        });

        // 4. 監聽滑鼠點擊事件 (Mouse Click)
        btn.addEventListener('click', function() {
            text.innerText = "Mouse Click";
            text.style.color = '#ff00ff'; // 確保點擊後維持顏色
        });
    </script>

</body>
</html>
</html>
