<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise10 12 14</title>
    <style>
        .container{
            position:relative;
            width:300px;
            height:220px;
            margin-top:20px;
        }
        .rectangle{
            position:absolute;
            width:160px;
            height:160px;
            background-color:blue;
            border:3px solid black;
            left:20px;
            top:20px;
        }
        .circle{
            position:absolute;
            width:130px;
            height:130px;
            background-color:yellow;
            border:5px solid red;
            border-radius:50%;
            left:110px;
            top:35px;
        }
    </style>
</head>
<body>
    <h2> Code Display </h2>
    <pre>
        <code>
            var person={
                firstName: "yicheng",
                lastName: "Lin",
                studentId: "113403027"
            }
        </code>
    </pre>
    <hr/>
    <h2>Form Example</h2>
    <form>
        <p>
            <lable for="fname">First Name：</lable>
            <br>
            <input type="text" id="fname" name="fname" value="Your first name"/>
        </p>
        <p>
            <lable for="lname">Lasy Name：</lable>
            <br>
            <input type="text" id="lname" name="lname" value="Your last name"/>
        </p>
        <p>
            <lable for="studentid">Student ID: </lable>
            <br>
            <input type="text" id="studentid" name="studentid" value="Your student ID"/>
        </p>
        <input type="submit" value="submit"/>
        <input type="reset" value="reset"/>
    </form>
    <hr/>
    <h2>Circle and Rectangle</h2>
    <div class="container">
        <div class="circle"></div>
        <div class="rectangle"></div>
    </div>
</body>
</html>
