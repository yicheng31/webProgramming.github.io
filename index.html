<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello world DEMO</title>
    <style>
        body {
    background-color: #e6e6e6;
    font-family: "Times New Roman", serif;
}

/* 外框 */
.container {
    width: 600px;
    margin: 50px auto;
    padding: 30px;
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* 第一個 */
.box1 {
    background: #9fb7c4;
    padding: 10px;
    border: 6px double #e86c4f;
    outline: 4px solid #e86c4f;
    margin-bottom: 25px;
}

/* 第二個 */
.box2 {
    background: #f0f25a;
    padding: 10px;
    border: 4px solid #5b8cff;
    border-radius: 15px;
    margin-bottom: 25px;
}

/* 第三個 */
.box3 {
    background: #6ea97a;
    padding: 10px;
    border: 8px dotted gray;
}
.h {
    width: 700px;
    margin: 50px auto;
    padding: 30px;
    background: #f5f5f5;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* heading1 */
.h1 {
    font-size: 40px;
    font-weight: bold;
    border-top: 6px solid black;
    display: inline-block;
    margin-bottom: 30px;
}

/* heading2 */
.h2 {
    font-size: 30px;
    font-style: italic;
    border: 3px solid black;
    outline: 6px solid #e6e64a;
    padding: 10px;
    margin-bottom: 40px;
}

/* heading3 */
.h3 {
    font-size: 28px;
    text-align: right;
    text-decoration: underline;
}
/* 文字 */
h1 {
    margin: 0;
}
    </style>
</head>
<body>
    <div class="containier">
        <div class="box1">Hello World</div>
        <div class="box2">Hello World</div>
        <div class="box3">Hello World</div>
    </div>
    <div class="h">

    <div class="h1">This is heading 1</div>

    <div class="h2">This is heading 2</div>

    <div class="h3">This is heading 3</div>

</div>
</html>
